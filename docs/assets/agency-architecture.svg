<svg viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"><title>Wingbeat agency structure</title><desc>Context sensors and repo evidence feed an agency manager, which assembles a dynamic specialist crew that produces a content package, executed through a human-vetoed X job, all persisted in Convex and rendered by the ops console.</desc>
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0L10,5L0,10z" fill="#888780"/></marker></defs>
<g><rect x="60" y="16" width="240" height="52" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="180" y="38" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">Context sensors</text><text x="180" y="55" text-anchor="middle" fill="#5F5E5A" font-size="12">codex · claude · hermes logs</text></g>
<g><rect x="400" y="16" width="240" height="52" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="520" y="38" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">Repo evidence</text><text x="520" y="55" text-anchor="middle" fill="#5F5E5A" font-size="12">git history · docs · diffs</text></g>
<line x1="200" y1="68" x2="310" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="500" y1="68" x2="390" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<g><rect x="250" y="112" width="200" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="350" y="134" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Agency manager</text><text x="350" y="151" text-anchor="middle" fill="#534AB7" font-size="12">assembles crew per story</text></g>
<line x1="290" y1="164" x2="150" y2="204" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="350" y1="164" x2="350" y2="204" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="410" y1="164" x2="555" y2="204" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ar)"/>
<g><rect x="40" y="208" width="200" height="56" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="140" y="231" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Narrative specialists</text><text x="140" y="248" text-anchor="middle" fill="#534AB7" font-size="12">strategist · creative director</text></g>
<g><rect x="255" y="208" width="190" height="56" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="350" y="231" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Verification</text><text x="350" y="248" text-anchor="middle" fill="#534AB7" font-size="12">critic · fact-checker</text></g>
<g><rect x="460" y="208" width="200" height="56" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="560" y="231" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Asset specialists</text><text x="560" y="248" text-anchor="middle" fill="#534AB7" font-size="12">visual brief · storyboard</text></g>
<line x1="140" y1="264" x2="270" y2="308" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="350" y1="264" x2="350" y2="308" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="560" y1="264" x2="430" y2="308" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ar)"/>
<g><rect x="200" y="312" width="300" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="350" y="335" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">Content package</text><text x="350" y="352" text-anchor="middle" fill="#5F5E5A" font-size="12">claims + evidence + playbook category</text></g>
<g><rect x="530" y="312" width="140" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="600" y="335" text-anchor="middle" fill="#085041" font-size="14" font-weight="600">Human veto</text><text x="600" y="352" text-anchor="middle" fill="#0F6E56" font-size="12">countdown window</text></g>
<line x1="330" y1="368" x2="235" y2="412" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="580" y1="368" x2="330" y2="418" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#ar)"/>
<g><rect x="100" y="416" width="260" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="230" y="439" text-anchor="middle" fill="#085041" font-size="14" font-weight="600">X executor job</text><text x="230" y="456" text-anchor="middle" fill="#0F6E56" font-size="12">queue → veto → ready → published</text></g>
<g><rect x="450" y="416" width="200" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="550" y="439" text-anchor="middle" fill="#085041" font-size="14" font-weight="600">Verified receipt</text><text x="550" y="456" text-anchor="middle" fill="#0F6E56" font-size="12">real public URL only</text></g>
<line x1="360" y1="444" x2="446" y2="444" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#ar)"/>
<g><rect x="40" y="520" width="400" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="240" y="543" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">Convex — single source of truth</text><text x="240" y="560" text-anchor="middle" fill="#5F5E5A" font-size="12">runs · events · jobs · receipts · memory</text></g>
<g><rect x="480" y="520" width="180" height="56" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="570" y="543" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">Ops console</text><text x="570" y="560" text-anchor="middle" fill="#5F5E5A" font-size="12">reactive queries</text></g>
<line x1="440" y1="548" x2="476" y2="548" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ar)"/>
<line x1="230" y1="472" x2="230" y2="516" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ar)"/>
<text x="60" y="605" fill="#888780" font-size="12">purple = AI agents · teal = human-gated execution · gray = data and infrastructure</text>
</svg>
