<svg viewBox="0 0 700 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"><title>Wingbeat scaffolded agent graph</title><desc>The Hermes plugin triggers an Agency Manager that runs a standing crew of six scaffolded agents and dynamically spawns up to three conditional specialists based on repository signals, flowing into a draft, critic loop, and X channel handoff.</desc>
<defs><marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0L10,5L0,10z" fill="#888780"/></marker><marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0L10,5L0,10z" fill="#7F77DD"/></marker><marker id="ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0L10,5L0,10z" fill="#D85A30"/></marker></defs>
<g><rect x="240" y="14" width="220" height="50" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="350" y="35" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">Hermes plugin</text><text x="350" y="52" text-anchor="middle" fill="#5F5E5A" font-size="12">hermes wingbeat run</text></g>
<line x1="350" y1="64" x2="350" y2="92" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<g><rect x="230" y="96" width="240" height="54" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="350" y="118" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Agency manager</text><text x="350" y="135" text-anchor="middle" fill="#534AB7" font-size="12">selects crew from repo signals</text></g>
<line x1="280" y1="150" x2="165" y2="184" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ap)"/>
<line x1="420" y1="150" x2="540" y2="184" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ac)"/>
<text x="60" y="178" fill="#888780" font-size="12">standing crew — always runs</text>
<text x="450" y="178" fill="#888780" font-size="12">spawned only on signal</text>
<g><rect x="60" y="188" width="210" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="165" y="210" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Project intelligence</text><text x="165" y="227" text-anchor="middle" fill="#534AB7" font-size="12">reads repo + docs</text></g>
<g><rect x="60" y="252" width="210" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="165" y="274" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Story detector</text><text x="165" y="291" text-anchor="middle" fill="#534AB7" font-size="12">finds the strongest story</text></g>
<g><rect x="60" y="316" width="210" height="52" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="165" y="338" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Creative director</text><text x="165" y="355" text-anchor="middle" fill="#534AB7" font-size="12">asset + visual brief</text></g>
<g><rect x="440" y="188" width="220" height="52" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="1" stroke-dasharray="6 4"/><text x="550" y="210" text-anchor="middle" fill="#712B13" font-size="14" font-weight="600">Technical fact-checker</text><text x="550" y="227" text-anchor="middle" fill="#993C1D" font-size="12">if runtime/agency changed</text></g>
<g><rect x="440" y="252" width="220" height="52" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="1" stroke-dasharray="6 4"/><text x="550" y="274" text-anchor="middle" fill="#712B13" font-size="14" font-weight="600">Product mockup specialist</text><text x="550" y="291" text-anchor="middle" fill="#993C1D" font-size="12">if UI or visuals changed</text></g>
<g><rect x="440" y="316" width="220" height="52" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="1" stroke-dasharray="6 4"/><text x="550" y="338" text-anchor="middle" fill="#712B13" font-size="14" font-weight="600">Execution safety planner</text><text x="550" y="355" text-anchor="middle" fill="#993C1D" font-size="12">if publishing surface changed</text></g>
<line x1="165" y1="368" x2="165" y2="400" stroke="#7F77DD" stroke-width="1.5"/>
<line x1="550" y1="368" x2="550" y2="400" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4"/>
<line x1="165" y1="400" x2="330" y2="400" stroke="#7F77DD" stroke-width="1.5"/>
<line x1="550" y1="400" x2="370" y2="400" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4"/>
<line x1="350" y1="400" x2="350" y2="430" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="360" y="420" fill="#888780" font-size="12">all outputs feed the draft</text>
<g><rect x="60" y="434" width="185" height="54" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="152" y="456" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Content strategist</text><text x="152" y="473" text-anchor="middle" fill="#534AB7" font-size="12">drafts from evidence</text></g>
<g><rect x="278" y="434" width="160" height="54" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="358" y="456" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">Editor / critic</text><text x="358" y="473" text-anchor="middle" fill="#534AB7" font-size="12">named findings gate</text></g>
<g><rect x="470" y="434" width="190" height="54" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="565" y="456" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="600">X channel adapter</text><text x="565" y="473" text-anchor="middle" fill="#534AB7" font-size="12">channel-fit compression</text></g>
<line x1="245" y1="461" x2="274" y2="461" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ap)"/>
<line x1="438" y1="461" x2="466" y2="461" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#ap)"/>
<path d="M 330 488 Q 250 520 170 490" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ac)"/>
<text x="215" y="520" fill="#888780" font-size="12">fail → revise</text>
<line x1="565" y1="488" x2="565" y2="546" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<g><rect x="400" y="550" width="270" height="50" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="535" y="571" text-anchor="middle" fill="#444441" font-size="14" font-weight="600">X executor handoff</text><text x="535" y="588" text-anchor="middle" fill="#5F5E5A" font-size="12">veto window → verified receipt</text></g>
<text x="60" y="628" fill="#888780" font-size="12">purple = scaffolded standing agents · coral dashed = created dynamically per run · gray = trigger and handoff</text>
</svg>
