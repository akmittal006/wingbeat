name: Bug report
description: Report a reproducible problem in Wingbeat.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Wingbeat. Do not include credentials, private repository content, unpublished copy, or vulnerability details. Security reports belong in the private channel described in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
      placeholder: The executor remained in veto after the deadline...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use a synthetic repository or redact private details.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agency runtime
        - Context and evidence
        - Operator console
        - X executor
        - Documentation or setup
        - Other
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      description: Paste the commit SHA or say "current default branch."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, pnpm version, and whether Hermes was enabled.
      placeholder: macOS 15, Node 22.12, pnpm 11, deterministic demo
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the smallest useful excerpt after removing sensitive data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, private content, cookies, browser storage, and unpublished copy.
          required: true
        - label: This is not a security vulnerability or unauthorized publishing report.
          required: true
